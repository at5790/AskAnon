<!DOCTYPE html>
<html>
<head>
    <title>Session - AskAnon</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
    <h1>{{ session.title }}</h1>

    <p>You joined session:</p>
    <h2>{{ session.join_code }}</h2>

    <form method="post" action="/ask-question">
        <input type="hidden" name="join_code" value="{{ session.join_code }}">
    
        <label for="text">Ask a question anonymously:</label>
        <br>
        <textarea id="text" name="text" required></textarea>
        <br><br>
    
        <button type="submit">Submit Question</button>
    </form>

    <h2>Questions</h2>

    {% if questions %}
        {% for question in questions %}
            <div class="question-card">
                <p>{{ question.text }}</p>
                <p>Upvotes: {{ question.upvotes }}</p>

                <form method="post" action="/upvote/{{ question.id }}">
                    <button type="submit">Upvote</button>
                </form>
            </div>
        {% endfor %}
    {% else %}
        <p>No questions yet.</p>
    {% endif %}

    <br>
    <a href="/student">Join Another Session</a>
    <a href="/">Home</a>
    </div>      
</body>
</html>
