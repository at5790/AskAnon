<!DOCTYPE html>
<html>
<head>
    <title>Student - AskAnon</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <h1>Student</h1>
    <p>Enter your class join code.</p>
    {% if error %}
    <p style="color: red;">{{ error }}</p>
    {% endif %}

    <form method="post" action="/join-session">
        <label for="join_code">Join Code:</label>
        <br>
        <input type="text" id="join_code" name="join_code" required>
        <br><br>

        <button type="submit">Join Session</button>
    </form>

    <br>
    <a href="/">Back Home</a>
</body>
</html>
